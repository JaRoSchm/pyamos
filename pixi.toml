[workspace]
name = "pyamos"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]
preview = ["pixi-build"]

[dependencies]
pyamos = { path = "." }
python = "3.13.*"
numpy = ">=2.4.2,<3"

[package]
name = { workspace = true }
version = { workspace = true }
license-file = { workspace = true }

[package.build]
backend = { name = "pixi-build-cmake", version = "*" }

[package.build.config]
extra-args = ["-DCMAKE_BUILD_TYPE=Debug", "-DCMAKE_CXX_FLAGS='-fno-inline'"]

[package.host-dependencies]
cmake = "4.*"
nanobind = "2.*"
python = "3.13.*"
